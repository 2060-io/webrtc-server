name: Continuous Deployment

on:
  push:
    branches: [main, 'release/**']
  workflow_dispatch:

jobs:
  versioning:
    name: Resolve version
    permissions:
      contents: write
      pull-requests: write
    uses: 2060-io/organization/.github/workflows/resolve-version-call.yml@main
    secrets: inherit

  build-and-push:
    name: Build and push Docker images
    needs: versioning
    if: needs.versioning.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    env:
      DH_USERNAME: ${{ secrets.DOCKER_HUB_LOGIN }}
      DH_TOKEN: ${{ secrets.DOCKER_HUB_PWD }}
      RELEASE_VERSION: ${{ needs.versioning.outputs.release-version }}
      RELEASE_TYPE: ${{ needs.versioning.outputs.release-type }}
      RELEASE_MAJOR: ${{ needs.versioning.outputs.release-major }}
      RELEASE_MINOR: ${{ needs.versioning.outputs.release-minor }}
      RELEASE_PATCH: ${{ needs.versioning.outputs.release-patch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Setup Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5

      - name: Resolve image tags
        run: |
          # Normalize version (strip a possible leading "v")
          VERSION="${RELEASE_VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Stable releases get clean tags, dev (prerelease) builds get a -dev suffix
          if [ "$RELEASE_TYPE" = "stable" ]; then
            echo "SUFFIX=" >> "$GITHUB_ENV"
          else
            echo "SUFFIX=-dev" >> "$GITHUB_ENV"
          fi

      - name: Log in to Docker Hub
        run: |
          echo "$DH_TOKEN" | docker login -u "$DH_USERNAME" --password-stdin

      - name: Build Docker images
        run: |
          for APP in webrtc-server loadbalancer; do
            IMAGE_NAME=$APP
            if [ "$APP" == "loadbalancer" ]; then
              IMAGE_NAME="webrtc-load-balancer"
            fi
            cp pnpm-lock.yaml apps/$APP/
            docker build -f apps/$APP/Dockerfile -t $DH_USERNAME/$IMAGE_NAME:v$VERSION apps/$APP/
          done

      - name: Add tags to Docker images and push to Docker Hub
        run: |
          for APP in webrtc-server loadbalancer; do
            IMAGE_NAME=$APP
            if [ "$APP" == "loadbalancer" ]; then
              IMAGE_NAME="webrtc-load-balancer"
            fi
            BASE="$DH_USERNAME/$IMAGE_NAME:v$VERSION"

            docker tag "$BASE" "$DH_USERNAME/$IMAGE_NAME:v${RELEASE_MAJOR}${SUFFIX}"
            docker tag "$BASE" "$DH_USERNAME/$IMAGE_NAME:v${RELEASE_MAJOR}.${RELEASE_MINOR}${SUFFIX}"
            docker tag "$BASE" "$DH_USERNAME/$IMAGE_NAME:v${RELEASE_MAJOR}.${RELEASE_MINOR}.${RELEASE_PATCH}${SUFFIX}"

            docker push "$DH_USERNAME/$IMAGE_NAME:v$VERSION"
            docker push "$DH_USERNAME/$IMAGE_NAME:v${RELEASE_MAJOR}${SUFFIX}"
            docker push "$DH_USERNAME/$IMAGE_NAME:v${RELEASE_MAJOR}.${RELEASE_MINOR}${SUFFIX}"
            docker push "$DH_USERNAME/$IMAGE_NAME:v${RELEASE_MAJOR}.${RELEASE_MINOR}.${RELEASE_PATCH}${SUFFIX}"

            # Moving tag for the latest dev build
            if [ "$RELEASE_TYPE" != "stable" ]; then
              docker tag "$BASE" "$DH_USERNAME/$IMAGE_NAME:dev"
              docker push "$DH_USERNAME/$IMAGE_NAME:dev"
            fi
          done

      - name: Log in to Docker Hub Helm Registry
        run: |
          echo "$DH_TOKEN" | helm registry login -u "$DH_USERNAME" --password-stdin docker.io

      - name: Push Helm charts to Docker Hub OCI repo
        run: |
          for chart in ./charts/*; do
            if [ -d "$chart" ]; then
              chart_name=$(grep '^name:' "$chart/Chart.yaml" | awk '{print $2}')
              sed -i "s/^version:.*/version: v$VERSION/" "$chart/Chart.yaml"
              helm dependency update "$chart"
              helm package "$chart" -d ./charts
              helm push ./charts/"$chart_name"-v$VERSION.tgz oci://docker.io/$DH_USERNAME
            fi
          done
