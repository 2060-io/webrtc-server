version: '3.9'

services:
  pymediasoup-service-client:
    build: .
    container_name: pymediasoup-service-client
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: ${FLASK_APP}
      FLASK_ENV: ${FLASK_ENV}
      DEFAULT_VIDEO_SRC_URL: ${DEFAULT_VIDEO_SRC_URL}
    networks:
      - networks-bridge

networks:
  networks-bridge:
    driver: bridge
